<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHEL SOS Analyzer v19 (Offline Edition)</title>
    <link href="./static/css/bootstrap.min.css" rel="stylesheet">
    <script src="./static/js/bootstrap.bundle.min.js"></script>
    <script src="./static/js/chart.js"></script>
    <script src="./static/pyodide/pyodide.js"></script>
    <style>
        :root { --sidebar-width: 260px; --bg-dark: #1e1e2f; --accent: #0d6efd; }
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { color: rgba(255,255,255,0.7); padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); border-left-color: var(--accent); }
        .main-content { flex: 1; overflow-y: auto; padding: 25px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-header { font-weight: 600; background: #fff; display: flex; justify-content: space-between; }
        .source-badge { font-size: 0.75rem; color: #fff; background-color: #6c757d; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
        .console-box { background: #2d2d3b; color: #e0e0e0; font-family: 'Consolas', monospace; padding: 15px; border-radius: 6px; white-space: pre-wrap; font-size: 0.85rem; max-height: 400px; overflow-y: auto; }
        .upload-wrapper { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .upload-box { border: 2px dashed #ccc; padding: 60px; border-radius: 16px; background: #fff; text-align: center; cursor: pointer; width: 600px; }
        .log-container { display: flex; height: calc(100vh - 120px); gap: 15px; background: #fff; border-radius: 8px; overflow: hidden; }
        .log-tree { width: 30%; background: #f8f9fa; border-right: 1px solid #ddd; overflow-y: auto; font-size: 0.9rem; }
        .log-viewer { width: 70%; background: #1e1e1e; color: #ccc; font-family: monospace; padding: 15px; overflow-y: auto; white-space: pre; }
        .log-group { padding: 8px 15px; font-weight: bold; background: #e9ecef; font-size: 0.8rem; color: #555; }
        .log-item { padding: 6px 20px; cursor: pointer; border-bottom: 1px solid #f1f1f1; word-break: break-all; }
        .log-item.active { background: #0d6efd; color: #fff; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="p-3 fw-bold border-bottom border-secondary">RHEL SOS Offline v19</div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link active" onclick="switchTab('dashboard')">📊 總覽 (Dashboard)</a>
            <a class="nav-link" onclick="switchTab('host-info')">🖥️ 系統資訊 (Host)</a>
            <a class="nav-link" onclick="switchTab('sar')">📈 效能監控 (SAR)</a>
            <a class="nav-link" onclick="switchTab('kernel')">⚙️ 核心與模組 (Kernel)</a>
            <a class="nav-link" onclick="switchTab('network')">🌐 網路狀態 (Network)</a>
            <a class="nav-link" onclick="switchTab('logs')">📝 日誌瀏覽器 (Logs)</a>
            <a class="nav-link" onclick="switchTab('debug')">🐞 檔案檢測 (Debug)</a>
        </nav>
    </div>

    <div class="main-content">
        <div id="loader" class="alert alert-info hidden">正在載入本地 Python 環境...</div>
        <div id="view-upload" class="upload-wrapper">
            <div class="upload-box" id="drop-zone">
                <div style="font-size: 3rem;">📂</div>
                <h4>上傳 SOS Report (.tar.xz)</h4>
                <p class="text-muted">點擊選擇檔案 或 拖曳至此</p>
            </div>
            <input type="file" id="dir-input" class="d-none" accept=".tar.xz,.tar.gz,.tar">
        </div>

        <div id="view-dashboard" class="content-view hidden">
            <div class="row g-3 mb-4">
                <div class="col-md-3"><div class="card p-3 text-center"><small>Hostname</small><div id="dash-hostname">-</div></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><small>Release</small><div id="dash-release">-</div></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><small>Kernel</small><div id="dash-kernel">-</div></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><small>Uptime</small><div id="dash-uptime">-</div></div></div>
            </div>
            <div class="row">
                <div class="col-md-4"><div class="card"><div class="card-header">Memory <span class="source-badge" id="src-mem"></span></div><div class="card-body"><canvas id="memChart"></canvas><div id="mem-text"></div></div></div></div>
                <div class="col-md-8"><div class="card"><div class="card-header">Top Processes <span class="source-badge" id="src-ps-dash"></span></div><div class="card-body p-0"><table class="table table-sm small"><thead><tr><th>PID</th><th>USER</th><th>MEM%</th><th>CPU%</th><th>COMMAND</th></tr></thead><tbody id="mem-table-body"></tbody></table></div></div></div>
            </div>
        </div>
        <div id="view-sar" class="content-view hidden"><div class="card"><div class="card-header">SAR CPU <span class="source-badge" id="src-sar"></span></div><div class="card-body"><select id="sar-select" onchange="loadSelectedSar(this.value)"></select><canvas id="sarCpuChart"></canvas></div></div></div>
        <div id="view-logs" class="content-view hidden"><div class="log-container"><div class="log-tree" id="log-tree"></div><div class="log-viewer" id="log-content-area"></div></div></div>
        <div id="view-debug" class="content-view hidden"><div class="console-box" id="debug-list"></div></div>
    </div>

    <script>
        let pyodideReadyPromise = null;
        const App = { files: new Map(), filePaths: [], cache: {}, processList: [], memChart: null, sarCpuChart: null };

        async function initPyodide() {
            if (!pyodideReadyPromise) {
                document.getElementById('loader').classList.remove('hidden');
                pyodideReadyPromise = loadPyodide({ indexURL: "./static/pyodide/" }); // 必須指向本地路徑
            }
            return pyodideReadyPromise;
        }

        async function handleFileUpload(file) {
            document.getElementById('loader').classList.remove('hidden');
            const pyodide = await initPyodide();
            const buffer = await file.arrayBuffer();
            pyodide.globals.set("uploaded_file", new Uint8Array(buffer));

            const pythonCode = `
import tarfile, io, js
files_map = {}
try:
    with tarfile.open(fileobj=io.BytesIO(js.uploaded_file.to_py()), mode='r:*') as tar:
        for m in tar:
            if m.isfile() and m.size < 10*1024*1024:
                try:
                    name = '/'.join(m.name.split('/')[1:])
                    files_map[name] = tar.extractfile(m).read().decode('utf-8')
                except: pass
except Exception as e: print(e)
files_map
`;
            const result = pyodide.runPython(pythonCode);
            const map = result.toJs();
            result.destroy();

            App.files.clear(); App.filePaths = [];
            for (let [path, content] of map) {
                App.filePaths.push(path);
                App.files.set(path, { text: async () => content });
            }
            startAnalysis();
        }

        async function startAnalysis() {
            // 執行各模組分析 (簡化版)
            const h = await findAndRead([/hostname$/]); if(h) document.getElementById('dash-hostname').textContent = h.trim();
            const r = await findAndRead([/redhat-release$/]); if(r) document.getElementById('dash-release').textContent = r.split('\n')[0];
            
            document.getElementById('view-upload').classList.add('hidden');
            switchTab('dashboard');
            document.getElementById('loader').classList.add('hidden');
        }

        async function findAndRead(regexList) {
            const path = App.filePaths.find(p => regexList.some(r => r.test(p)));
            if (!path) return null;
            return await App.files.get(path).text();
        }

        const dropZone = document.getElementById('drop-zone');
        dropZone.onclick = () => document.getElementById('dir-input').click();
        document.getElementById('dir-input').onchange = (e) => handleFileUpload(e.target.files[0]);

        function switchTab(id) {
            document.querySelectorAll('.content-view').forEach(e => e.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
        }
    </script>
</body>
</html>
